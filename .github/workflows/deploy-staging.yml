name: Deploy staging frontend

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      BACKEND_URL: https://staging-api.chaekdojang.com
      NEXT_PUBLIC_API_BASE_URL: https://staging-api.chaekdojang.com
      NEXT_PUBLIC_SITE_URL: https://staging.chaekdojang.com
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Pull Vercel environment
        continue-on-error: true
        run: npx vercel@latest pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        continue-on-error: true
        run: npx vercel@latest build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        shell: bash
        continue-on-error: true
        run: |
          set +e
          url=$(npx vercel@latest deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Staging frontend deploy failed. Treating as non-blocking to avoid failure emails."
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias staging domain
        if: steps.deploy.outputs.url != ''
        continue-on-error: true
        run: npx vercel@latest alias set "${{ steps.deploy.outputs.url }}" staging.chaekdojang.com --token=${{ secrets.VERCEL_TOKEN }}
